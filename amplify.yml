version: 1
frontend:
  phases:
    preBuild:
      commands:
        - env | grep -e DATABASE_URL -e DIRECT_URL -e NEXT_PUBLIC_SUPABASE_URL -e NEXT_PUBLIC_SUPABASE_ANON_KEY -e SUPABASE_SERVICE_ROLE_KEY >> .env.production
        - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
