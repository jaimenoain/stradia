name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      # Only trigger the deployment if files within the functions directory are modified
      - 'supabase/functions/**'

jobs:
  deploy-functions:
    name: Provision and Deploy Edge Functions
    runs-on: ubuntu-latest

    # Environment variables securely populated from GitHub Actions Secrets
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone for faster execution

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Environment and Tooling
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Error: Deployment secrets (SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_ID) are missing."
            exit 1
          fi
          echo "Supabase CLI version:"
          supabase --version

      - name: Deploy Functions to Supabase
        # Deploys all Edge Functions to the linked project.
        # The CLI automatically authenticates using the SUPABASE_ACCESS_TOKEN present in the environment.
        run: |
          echo "Deploying Supabase Edge Functions to project $SUPABASE_PROJECT_ID..."
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID
